name: MLflow Retraining CI

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
      - '.github/workflows/retraining.yml'
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager local

      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(ls MLProject/mlruns/0 | grep -v "meta.yaml" | head -n 1)
          echo "Latest MLflow Run ID: $RUN_ID"

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-artifacts
          path: Workflow-CI/MLProject/mlruns/

      - name: Build Docker Model
        run: echo "Building Docker Model..."

      - name: Log in to Docker Hub
        run: echo "Logging in to Docker Hub (Dummy)..."

      - name: Tag Docker Image
        run: echo "Tagging Docker Image..."

      - name: Push Docker Image
        run: echo "Pushing Docker Image..."
